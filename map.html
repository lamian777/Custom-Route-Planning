<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>行程地图</title>
  <style>
    :root {
      --ink: #222;
      --muted: #8a8a8a;
      --land: #d9d9d9;
      --water: #fff;
      --route: #2d2d2d;
      --flight: #8f8f8f;
      --rail: #2f9a55;
      --bus: #2d2d2d;
      --ship: #2d72d2;
      --route-soft: rgba(0,0,0,.12);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #fff;
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    .route-map-module {
      width: 100%;
      margin: 0 auto;
      padding: 8px;
      background: #fff;
    }

    .route-map-frame {
      position: relative;
      overflow: hidden;
      border: 1px solid #dedede;
      border-radius: 14px;
      background: #fff;
    }

    .route-map-svg {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 920 / 480;
    }

    .map-bg {
      fill: #fff;
    }

    .region {
      fill: var(--land);
      stroke: #fff;
      stroke-width: 2.2;
      stroke-linejoin: round;
    }

    .water {
      fill: var(--water);
      opacity: .98;
    }

    .river {
      fill: none;
      stroke: rgba(255,255,255,.9);
      stroke-width: 2.2;
      stroke-linecap: round;
    }

    .geo-label {
      fill: #9a9a9a;
      font-size: 12px;
      font-weight: 500;
      text-anchor: middle;
    }

    .route-line {
      fill: none;
      stroke: var(--route);
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .route-line.flight {
      stroke: var(--flight);
      stroke-dasharray: 8 8;
    }

    .route-line.rail {
      stroke: var(--rail);
    }

    .route-line.bus {
      stroke: var(--bus);
    }

    .route-line.ship {
      stroke: var(--ship);
    }

    .route-arrow {
      fill: var(--route);
      stroke: #fff;
      stroke-width: .8;
      paint-order: stroke;
    }

    .route-arrow.flight { fill: var(--flight); }
    .route-arrow.rail { fill: var(--rail); }
    .route-arrow.bus { fill: var(--bus); }
    .route-arrow.ship { fill: var(--ship); }

    .route-node {
      fill: var(--route);
      stroke: var(--route);
      stroke-width: 2;
    }

    .route-node-ring {
      fill: var(--route);
      stroke: #fff;
      stroke-width: 2.5;
    }

    .place-label {
      fill: var(--ink);
      font-size: 17px;
      font-weight: 720;
      letter-spacing: 0;
      text-anchor: middle;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4.2px;
      stroke-linejoin: round;
    }

    .place-label.small {
      font-size: 15px;
    }

    .place-label.remote {
      fill: #8c713d;
    }

    .map-note {
      fill: var(--muted);
      font-size: 14px;
      text-anchor: end;
    }

    .zoom-controls {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      backdrop-filter: blur(10px);
    }

    .zoom-controls button {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid rgba(0,0,0,.18);
      border-radius: 50%;
      background: #fff;
      color: var(--ink);
      font: 700 17px/1 var(--font);
      cursor: pointer;
    }

    .zoom-controls input {
      width: 96px;
      accent-color: #333;
    }

    .zoom-value {
      min-width: 38px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    @media (max-width: 620px) {
      .route-map-module { padding: 0; }
      .route-map-frame {
        border-radius: 0;
        overflow-x: auto;
      }
      .route-map-svg {
        width: 860px;
        height: auto;
        max-width: none;
      }
      .zoom-controls {
        left: 10px;
        right: auto;
        top: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="route-map-module">
    <div class="route-map-frame">
      <div class="zoom-controls" aria-label="地图缩放">
        <button id="zoomOut" type="button" aria-label="缩小">−</button>
        <input id="zoomRange" type="range" min="80" max="145" value="115" step="5" aria-label="地图缩放比例">
        <button id="zoomIn" type="button" aria-label="放大">+</button>
        <span class="zoom-value" id="zoomValue">115%</span>
      </div>
      <svg class="route-map-svg" id="routeMapSvg" viewBox="0 40 920 480" role="img" aria-label="行程地图"></svg>
    </div>
  </main>

  <script>
    (() => {
      "use strict";

      // 后续替换、删除地点时，只改这个数组即可。x/y 为局部示意坐标，不需要真实经纬度。
      const stops = [
        { name: "大连", x: 765, y: 104, labelDx: 28, labelDy: -16, remote: true, mode: "flight", pathStyle: "inbound" },
        { name: "重庆", x: 620, y: 312, labelDx: 42, labelDy: 18, mode: "rail", curve: -34 },
        { name: "成都", x: 414, y: 284, labelDx: 42, labelDy: -8, mode: "bus", curve: 28 },
        { name: "都江堰", x: 366, y: 232, labelDx: -42, labelDy: -12, mode: "bus", curve: 26 },
        { name: "青城山", x: 358, y: 304, labelDx: -44, labelDy: 20, mode: "bus", curve: -50 },
        { name: "乐山", x: 460, y: 402, labelDx: 34, labelDy: 22, mode: "bus", curve: 22 },
        { name: "峨眉山", x: 402, y: 444, labelDx: -42, labelDy: 20, mode: "flight", pathStyle: "return" },
        { name: "大连", x: 765, y: 104, labelDx: 28, labelDy: -16, remote: true }
      ];

      const svg = document.getElementById("routeMapSvg");
      const zoomRange = document.getElementById("zoomRange");
      const zoomValue = document.getElementById("zoomValue");
      const width = 920;
      const height = 560;
      const focus = { x: 455, y: 320 };

      const regions = [
        "M56 108 C142 62 228 58 306 84 C386 111 414 160 494 174 C589 190 676 160 790 104 L878 78 L878 466 L742 480 C648 493 594 456 514 462 C428 469 371 503 278 479 C197 458 134 392 96 308 C63 232 34 156 56 108 Z",
        "M135 302 C194 268 256 245 330 247 C411 249 473 282 533 328 C584 367 657 378 724 358 C775 343 817 314 868 324 L868 501 L50 501 L50 358 C79 342 104 323 135 302 Z",
        "M314 184 C360 158 431 144 497 155 C558 165 607 203 656 244 C611 263 565 267 509 251 C450 235 391 226 321 239 Z"
      ];
      const rivers = [
        "M24 328 C154 340 242 341 346 323 C446 306 535 314 660 290 C744 274 820 248 896 265",
        "M216 210 C282 202 344 212 414 237 C481 260 560 260 640 236"
      ];
      function scaledPoint(point) {
        const zoom = Number(zoomRange.value) / 100;
        return {
          x: focus.x + (point.x - focus.x) * zoom,
          y: focus.y + (point.y - focus.y) * zoom
        };
      }

      function scalePath(path) {
        const zoom = Number(zoomRange.value) / 100;
        return path.replace(/-?\d+(?:\.\d+)?/g, (value, offset, full) => {
          const number = Number(value);
          const before = full.slice(0, offset);
          const count = (before.match(/-?\d+(?:\.\d+)?/g) || []).length;
          const axis = count % 2 ? "y" : "x";
          const scaled = axis === "x"
            ? focus.x + (number - focus.x) * zoom
            : focus.y + (number - focus.y) * zoom;
          return scaled.toFixed(1);
        });
      }

      function segmentPath(from, to, index) {
        const a = scaledPoint(from);
        const b = scaledPoint(to);
        if (from.pathStyle === "inbound") {
          const c1 = scaledPoint({ x: 770, y: 76 });
          const c2 = scaledPoint({ x: 745, y: 226 });
          return `M ${a.x.toFixed(1)} ${a.y.toFixed(1)} C ${c1.x.toFixed(1)} ${c1.y.toFixed(1)} ${c2.x.toFixed(1)} ${c2.y.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;
        }
        if (from.pathStyle === "return") {
          const c1 = scaledPoint({ x: 598, y: 514 });
          const c2 = scaledPoint({ x: 862, y: 428 });
          return `M ${a.x.toFixed(1)} ${a.y.toFixed(1)} C ${c1.x.toFixed(1)} ${c1.y.toFixed(1)} ${c2.x.toFixed(1)} ${c2.y.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;
        }
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const curve = Number.isFinite(from.curve) ? from.curve : (index % 2 ? -30 : 30);
        const normal = Math.hypot(dx, dy) || 1;
        const cx = (a.x + b.x) / 2 - dy / normal * curve;
        const cy = (a.y + b.y) / 2 + dx / normal * curve;
        return `M ${a.x.toFixed(1)} ${a.y.toFixed(1)} Q ${cx.toFixed(1)} ${cy.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;
      }

      function pointOnQuadratic(a, c, b, t) {
        const mt = 1 - t;
        return {
          x: mt * mt * a.x + 2 * mt * t * c.x + t * t * b.x,
          y: mt * mt * a.y + 2 * mt * t * c.y + t * t * b.y
        };
      }

      function tangentOnQuadratic(a, c, b, t) {
        return {
          x: 2 * (1 - t) * (c.x - a.x) + 2 * t * (b.x - c.x),
          y: 2 * (1 - t) * (c.y - a.y) + 2 * t * (b.y - c.y)
        };
      }

      function pointOnCubic(a, c1, c2, b, t) {
        const mt = 1 - t;
        return {
          x: mt ** 3 * a.x + 3 * mt * mt * t * c1.x + 3 * mt * t * t * c2.x + t ** 3 * b.x,
          y: mt ** 3 * a.y + 3 * mt * mt * t * c1.y + 3 * mt * t * t * c2.y + t ** 3 * b.y
        };
      }

      function tangentOnCubic(a, c1, c2, b, t) {
        const mt = 1 - t;
        return {
          x: 3 * mt * mt * (c1.x - a.x) + 6 * mt * t * (c2.x - c1.x) + 3 * t * t * (b.x - c2.x),
          y: 3 * mt * mt * (c1.y - a.y) + 6 * mt * t * (c2.y - c1.y) + 3 * t * t * (b.y - c2.y)
        };
      }

      function segmentShape(from, to, index) {
        const a = scaledPoint(from);
        const b = scaledPoint(to);
        const t = from.pathStyle === "return" ? .52 : .5;
        let path, point, tangent;
        if (from.pathStyle === "inbound") {
          const c1 = scaledPoint({ x: 770, y: 76 });
          const c2 = scaledPoint({ x: 745, y: 226 });
          path = `M ${a.x.toFixed(1)} ${a.y.toFixed(1)} C ${c1.x.toFixed(1)} ${c1.y.toFixed(1)} ${c2.x.toFixed(1)} ${c2.y.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;
          point = pointOnCubic(a, c1, c2, b, t);
          tangent = tangentOnCubic(a, c1, c2, b, t);
        } else if (from.pathStyle === "return") {
          const c1 = scaledPoint({ x: 598, y: 514 });
          const c2 = scaledPoint({ x: 862, y: 428 });
          path = `M ${a.x.toFixed(1)} ${a.y.toFixed(1)} C ${c1.x.toFixed(1)} ${c1.y.toFixed(1)} ${c2.x.toFixed(1)} ${c2.y.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;
          point = pointOnCubic(a, c1, c2, b, t);
          tangent = tangentOnCubic(a, c1, c2, b, t);
        } else {
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const curve = Number.isFinite(from.curve) ? from.curve : (index % 2 ? -30 : 30);
          const normal = Math.hypot(dx, dy) || 1;
          const c = {
            x: (a.x + b.x) / 2 - dy / normal * curve,
            y: (a.y + b.y) / 2 + dx / normal * curve
          };
          path = `M ${a.x.toFixed(1)} ${a.y.toFixed(1)} Q ${c.x.toFixed(1)} ${c.y.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;
          point = pointOnQuadratic(a, c, b, t);
          tangent = tangentOnQuadratic(a, c, b, t);
        }
        const angle = Math.atan2(tangent.y, tangent.x) * 180 / Math.PI;
        return { path, arrow: { x: point.x, y: point.y, angle } };
      }

      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, match => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
        })[match]);
      }

      function uniqueStops(items) {
        const seen = new Set();
        return items.filter(stop => {
          const key = `${stop.name}:${stop.x.toFixed(1)}:${stop.y.toFixed(1)}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function renderBaseMap() {
        return `
          <rect class="map-bg" x="0" y="0" width="${width}" height="${height}"></rect>
          ${regions.map(path => `<path class="region" d="${scalePath(path)}"></path>`).join("")}
          ${rivers.map(path => `<path class="river" d="${scalePath(path)}"></path>`).join("")}
        `;
      }

      function renderRoute() {
        const segments = stops.slice(0, -1).map((stop, index) => {
          const next = stops[index + 1];
          const shape = segmentShape(stop, next, index);
          const mode = stop.mode || "bus";
          return { path: shape.path, arrow: shape.arrow, mode };
        });
        const routeLines = segments.map(segment => `<path class="route-line ${segment.mode}" d="${segment.path}"></path>`).join("");
        const arrows = segments.map(segment => `
          <path class="route-arrow ${segment.mode}" d="M 0 -6 L 14 0 L 0 6 Z" transform="translate(${segment.arrow.x.toFixed(1)} ${segment.arrow.y.toFixed(1)}) rotate(${segment.arrow.angle.toFixed(1)})"></path>
        `).join("");
        const nodes = uniqueStops(stops).map(stop => {
          const point = scaledPoint(stop);
          const labelX = point.x + (stop.labelDx || 0);
          const labelY = point.y + (stop.labelDy || -14);
          return `
            <g>
              <circle class="route-node-ring" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="8"></circle>
              <circle class="route-node" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="5"></circle>
              <text class="place-label ${stop.name.length > 3 ? "small" : ""} ${stop.remote ? "remote" : ""}" x="${labelX.toFixed(1)}" y="${labelY.toFixed(1)}">${esc(stop.name)}</text>
            </g>
          `;
        }).join("");
        return `${routeLines}${arrows}${nodes}`;
      }

      function render() {
        zoomValue.textContent = `${zoomRange.value}%`;
        svg.innerHTML = renderBaseMap() + renderRoute();
      }

      zoomRange.addEventListener("input", render);
      document.getElementById("zoomOut").addEventListener("click", () => {
        zoomRange.value = Math.max(Number(zoomRange.min), Number(zoomRange.value) - 5);
        render();
      });
      document.getElementById("zoomIn").addEventListener("click", () => {
        zoomRange.value = Math.min(Number(zoomRange.max), Number(zoomRange.value) + 5);
        render();
      });

      render();
    })();
  </script>
</body>
</html>
