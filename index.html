<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>旅行线路定制</title>
  <style>
    :root {
      --primary: #e02a4e;
      --primary-active: #bd143c;
      --primary-soft: #fff1f4;
      --primary-border: #ffd1da;
      --primary-print-border: #f1cbd4;
      --ink: #222;
      --body: #3f3f3f;
      --muted: #6a6a6a;
      --line: #ddd;
      --soft-line: #ebebeb;
      --soft: #f7f7f7;
      --canvas: #fff;
      --danger: #c13515;
      --shadow: rgba(0,0,0,.02) 0 0 0 1px, rgba(0,0,0,.04) 0 2px 6px, rgba(0,0,0,.10) 0 4px 12px;
      --radius: 14px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--soft);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    button, input, textarea, select { font: inherit; color: inherit; }
    button { cursor: pointer; }
    .topbar {
      position: sticky; top: 0; z-index: 20;
      height: 72px; padding: 0 24px;
      display: flex; align-items: center; gap: 20px;
      background: rgba(255,255,255,.94); border-bottom: 1px solid var(--soft-line);
      backdrop-filter: blur(18px);
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .brand-mark {
      width: 38px; height: 38px; display: block;
      border-radius: 12px; object-fit: cover;
    }
    .brand h1 { margin: 0; font-size: 17px; font-weight: 650; letter-spacing: -.2px; }
    .save-state { color: var(--muted); font-size: 12px; margin-top: 1px; }
    .task-switcher {
      position: absolute; left: clamp(190px, calc(46vw - 315px), 460px); top: 50%; transform: translateY(-50%);
      width: 300px; min-width: 190px; max-width: 300px;
    }
    .task-trigger { width: 100%; justify-content: space-between; }
    .task-trigger span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-menu {
      position: absolute; top: calc(100% + 8px); left: 0; z-index: 70; width: min(360px, calc(100vw - 24px));
      padding: 10px; background: #fff; border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow);
    }
    .task-list { max-height: 300px; overflow: auto; display: grid; gap: 4px; }
    .task-item { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 6px; align-items: center; border-radius: 9px; }
    .task-select {
      min-width: 0; padding: 9px 10px; display: grid; grid-template-columns: auto minmax(0,1fr); align-items: center; gap: 9px;
      border: 0; border-radius: 9px; background: transparent; text-align: left;
    }
    .task-select:hover { background: var(--soft); }
    .task-item.active .task-select {
      position: relative; background: var(--primary-soft);
    }
    .task-item.active .task-select::before {
      content: ""; position: absolute; left: 0; top: 5px; bottom: 5px; width: 3px;
      background: var(--primary); border-radius: 999px;
    }
    .task-select-copy { min-width: 0; }
    .task-select strong, .task-select small { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-select small { color: var(--muted); font-size: 11px; font-weight: 400; }
    .task-color-dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 0 2px #fff, 0 0 0 3px rgba(0,0,0,.08); }
    .task-delete { padding: 7px 8px; border: 0; border-radius: 8px; color: var(--muted); background: transparent; font-size: 12px; }
    .task-delete:hover { color: var(--danger); background: #fff1ee; }
    .task-theme-picker { margin-top: 9px; padding: 10px 8px 2px; border-top: 1px solid var(--soft-line); }
    .task-theme-picker-label { margin-bottom: 8px; color: var(--muted); font-size: 11px; font-weight: 600; }
    .task-theme-options { display: flex; flex-wrap: wrap; gap: 8px; }
    .task-theme-option {
      width: 28px; height: 28px; padding: 0; border: 3px solid #fff; border-radius: 50%;
      box-shadow: 0 0 0 1px var(--line); transition: transform .15s, box-shadow .15s;
    }
    .task-theme-option:hover { transform: scale(1.08); }
    .task-theme-option[aria-pressed="true"] { box-shadow: 0 0 0 2px var(--ink); }
    .top-actions { margin-left: auto; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .history-switcher, .import-switcher, .settings-switcher, .export-switcher { position: relative; }
    .history-switcher > .btn, .import-switcher > .btn, .settings-switcher > .btn, .export-switcher > .btn { width: 104px; }
    .import-menu, .settings-menu, .export-menu {
      position: absolute; top: calc(100% + 8px); right: 0; z-index: 70; width: 220px;
      padding: 6px; background: #fff; border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow);
    }
    .import-menu { width: 126px; }
    .settings-menu { width: 150px; }
    .import-menu .btn, .settings-menu .btn, .export-menu .btn {
      width: 100%; min-height: 38px; justify-content: flex-start;
      border: 0; background: transparent; color: var(--muted);
    }
    .import-menu .btn { padding: 0 10px; }
    .import-menu .btn:hover, .settings-menu .btn:hover, .export-menu .btn:hover { color: var(--ink); background: var(--soft); }
    .btn {
      min-height: 42px; padding: 0 16px;
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      border: 1px solid var(--line); border-radius: 10px;
      background: var(--canvas); font-weight: 600;
      transition: .18s ease;
    }
    .btn:hover { border-color: #b0b0b0; background: var(--soft); }
    .btn:active { transform: scale(.98); }
    .btn:disabled { color: var(--muted); background: var(--soft); border-color: var(--line); cursor: not-allowed; transform: none; }
    .btn-primary { color: #fff; background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { color: #fff; background: var(--primary-active); border-color: var(--primary-active); }
    .btn-small { min-height: 34px; padding: 0 11px; border-radius: 9px; font-size: 13px; }
    .workspace {
      width: min(1600px, 100%); min-height: calc(100vh - 72px); margin: auto; padding: 20px;
      display: grid; grid-template-columns: minmax(420px, .92fr) minmax(520px, 1.08fr); gap: 20px; align-items: start;
    }
    .panel {
      min-width: 0; background: var(--canvas); border: 1px solid var(--soft-line);
      border-radius: 20px; box-shadow: 0 1px 2px rgba(0,0,0,.03); overflow: hidden;
    }
    .editor-panel { min-height: 0; display: flex; flex-direction: column; }
    .editor-scroll { min-height: 0; padding: 20px; overflow-x: hidden; overflow-y: auto; }
    .editor-group + .editor-group {
      margin-top: 20px;
    }
    .editor-group-head {
      position: relative; margin: 0 0 18px; min-height: 30px; padding-left: 14px;
      display: flex; align-items: center; justify-content: flex-end; gap: 9px; text-align: right;
    }
    .editor-group-head::before {
      content: ""; flex: 1; height: 1px; min-width: 42px;
      background: var(--line); border-radius: 999px;
    }
    .editor-group-head::after {
      content: ""; position: absolute; left: 0; top: 5px; bottom: 5px; width: 3px;
      background: var(--primary); border-radius: 999px;
    }
    .editor-group-index {
      color: var(--primary); font-size: 18px; font-weight: 850; letter-spacing: .02em;
    }
    .editor-group-title {
      margin: 0; color: var(--ink); font-size: 18px; font-weight: 800; letter-spacing: 0;
    }
    .section { margin-bottom: 24px; }
    .section:last-child { margin-bottom: 0; }
    .section-title {
      margin: 0 0 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
      font-size: 15px; font-weight: 650;
    }
    .editor-panel .section-title {
      color: var(--muted); font-size: 12px; font-weight: 600;
    }
    .field { display: block; margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field span { display: block; margin: 0 0 6px; color: var(--muted); font-size: 12px; font-weight: 600; }
    .field span.section-title { margin-bottom: 10px; color: var(--ink); font-size: 15px; font-weight: 650; }
    .editor-panel .field span.section-title {
      color: var(--muted); font-size: 12px; font-weight: 600;
    }
    .field .required-mark { margin-right: 3px; color: var(--primary); font-weight: 800; }
    input, textarea, select {
      width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 9px;
      outline: none; background: #fff; resize: vertical; transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--ink); box-shadow: 0 0 0 1px var(--ink); }
    textarea { min-height: 76px; line-height: 1.55; }
    textarea:placeholder-shown:not([data-list-field]):not(.quote-cell-text) { height: 44px; min-height: 44px; }
    textarea:not(:placeholder-shown):not([data-list-field]):not(.quote-cell-text) { min-height: 76px; }
    .bullet-list-editor {
      min-height: 76px; padding: 11px 12px; border: 1px solid var(--line); border-radius: 9px;
      background: #fff; transition: border-color .15s;
    }
    .bullet-list-editor:focus { border-color: var(--ink); box-shadow: 0 0 0 1px var(--ink); outline: none; }
    .bullet-list-row { position: relative; min-height: 22px; padding-left: 17px; line-height: 1.55; }
    .bullet-list-row::before {
      content: ""; position: absolute; left: 0; top: .72em; width: 5px; height: 5px;
      background: var(--primary); border-radius: 50%;
    }
    .demand-inline { display: grid; grid-template-columns: minmax(0,1fr) auto; align-items: end; gap: 10px; }
    .demand-inline .field { margin-bottom: 0; }
    .demand-file-zone, .demand-inline .btn-primary { height: 50px; }
    .demand-inline .btn-primary { min-width: 78px; align-self: end; }
    .demand-file-zone {
      padding: 6px 12px; display: flex; align-items: center; gap: 8px;
      border: 1px solid var(--line); border-radius: 9px; background: #fff; transition: border-color .15s, background .15s, box-shadow .15s;
    }
    .demand-file-zone .btn { min-height: 34px; padding: 0 10px; border-radius: 7px; font-weight: 500; }
    .demand-file-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
    .demand-drop.drag-over .demand-file-zone {
      border-color: var(--primary); background: var(--primary-soft); box-shadow: 0 0 0 1px var(--primary);
    }
    .demand-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; margin-top: 12px; }
    .demand-status {
      margin-top: 12px; min-height: 46px; padding: 13px 14px; display: grid; place-items: center;
      text-align: center; color: var(--muted); background: var(--soft); border-radius: 10px; font-size: 12px;
    }
    .demand-status.busy::before {
      content: ""; width: 16px; height: 16px; margin-bottom: 7px; border: 2px solid #ddd;
      border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite;
    }
    .demand-status.error { color: var(--danger); background: #fff1ee; }
    .demand-review { margin-top: 12px; display: grid; gap: 12px; }
    .demand-review .review-summary, .demand-review .review-section { border: 1px solid var(--soft-line); border-radius: 10px; background: #fff; }
    .demand-review .review-summary { padding: 12px; display: grid; gap: 3px; }
    .demand-review .review-summary span { color: var(--muted); font-size: 12px; }
    .demand-review .review-section { padding: 12px; }
    .demand-review h4 { margin: 0 0 8px; font-size: 13px; }
    .demand-review .review-list { margin: 0; padding-left: 18px; color: var(--body); }
    .demand-review .review-days { display: grid; gap: 6px; }
    .demand-review .review-day { padding: 8px 10px; background: var(--soft); border-radius: 8px; font-size: 12px; }
    .demand-review .review-day strong { margin-right: 7px; color: var(--primary); }
    .date-picker-wrap { position: relative; }
    .date-trigger {
      width: 100%; min-height: 44px; padding: 11px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
      border: 1px solid var(--line); border-radius: 9px; background: #fff; text-align: left;
    }
    .date-trigger:hover { border-color: #b0b0b0; }
    .date-trigger .placeholder { color: var(--muted); }
    .calendar-popover {
      position: fixed; z-index: 80; width: 310px; padding: 14px;
      background: #fff; border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow);
    }
    .calendar-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .calendar-title { font-size: 15px; font-weight: 700; }
    .calendar-nav { display: flex; gap: 6px; }
    .calendar-nav button {
      width: 36px; height: 36px; padding: 0; border: 1px solid var(--line); border-radius: 50%; background: #fff; font-size: 20px;
    }
    .calendar-nav button:hover { background: var(--soft); }
    .calendar-week, .calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; text-align: center; }
    .calendar-week { margin-bottom: 4px; color: var(--muted); font-size: 12px; }
    .calendar-day {
      aspect-ratio: 1; padding: 0; border: 0; border-radius: 50%; background: transparent; font-size: 13px;
    }
    .calendar-day:hover { background: var(--soft); }
    .calendar-day.other { color: #aaa; }
    .calendar-day.current { box-shadow: inset 0 0 0 1px var(--line); }
    .calendar-day.selected { color: #fff; background: var(--ink); }
    .calendar-day.selected:hover { background: var(--ink); }
    .calendar-actions { margin-top: 12px; display: flex; align-items: center; gap: 7px; border-top: 1px solid var(--soft-line); padding-top: 12px; }
    .calendar-actions .confirm { margin-left: auto; }
    .calendar-actions button:disabled { opacity: .4; cursor: not-allowed; }
    .day-card {
      margin-bottom: 12px; border: 1px solid var(--line); border-radius: var(--radius);
      background: var(--canvas); overflow: hidden; transition: opacity .15s ease, transform .15s ease, border-color .15s ease, background-color .15s ease;
    }
    .day-card.dragging { opacity: .55; border-color: var(--primary); transform: scale(.985); }
    .day-card.drag-over { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-border); }
    .day-card[open] { border-color: #c7cbd1; background: #e3e5e8; box-shadow: 0 2px 10px rgba(0,0,0,.04); }
    .day-card summary {
      padding: 13px 14px; display: flex; align-items: center; gap: 10px;
      list-style: none; cursor: pointer; user-select: none; transition: background-color .15s ease;
    }
    .day-card[open] summary { background: #dde0e4; }
    .day-card summary::-webkit-details-marker { display: none; }
    .day-card summary::after { content: "⌄"; flex: none; color: var(--muted); font-size: 17px; }
    .day-card[open] summary::after { transform: rotate(180deg); }
    .notice-card { margin-bottom: 12px; }
    .notice-card summary::after { order: 3; }
    .notice-summary { min-width: 0; }
    .notice-summary strong, .notice-summary small { display: block; }
    .notice-summary-muted strong { color: var(--muted); }
    .notice-summary-active strong { color: var(--ink); }
    .notice-summary small { color: var(--muted); font-size: 11px; font-weight: 400; }
    .visibility-toggle {
      order: 2; flex: none; margin-left: auto; display: inline-flex; align-items: center; gap: 7px;
      color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .visibility-toggle input { width: 16px; height: 16px; margin: 0; accent-color: var(--primary); }
    .summary-delete {
      flex: none; min-width: 42px; height: 32px; margin-left: auto; padding: 0 8px; display: grid; place-items: center;
      color: var(--muted); border: 0; border-radius: 8px; background: transparent; font-size: 12px; font-weight: 600;
      opacity: 0; visibility: hidden; pointer-events: none; transition: opacity .15s ease, background-color .15s ease, color .15s ease;
    }
    .summary-delete:hover { color: var(--danger); background: #fff1ee; }
    .day-card:hover .summary-delete {
      opacity: 1; visibility: visible; pointer-events: auto;
    }
    .day-badge {
      flex: none; min-width: 38px; height: 30px; padding: 0 8px; display: grid; place-items: center;
      color: #fff; background: var(--primary); border-radius: 999px; font-size: 12px; font-weight: 700;
    }
    .day-summary { min-width: 0; }
    .day-summary strong, .day-summary small { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .day-summary strong { font-size: 14px; font-weight: 650; }
    .day-summary small { color: var(--muted); }
    .day-body { padding: 15px; border-top: 1px solid var(--soft-line); background: #fdfdfd; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 0 12px; margin-bottom: 12px; }
    .grid-2 .field { margin-bottom: 0; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 0 10px; }
    .lodging-field .lodging-head { margin: 0 0 6px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .lodging-field .lodging-head span { margin: 0; }
    .lodging-link-toggle {
      min-height: 28px; padding: 0 9px; border: 1px solid #2577e3; border-radius: 8px;
      color: #fff; background: #2577e3; font-size: 12px; font-weight: 600;
    }
    .lodging-link-toggle:hover, .lodging-link-toggle.active { color: #fff; border-color: #1f63bd; background: #1f63bd; }
    .lodging-link-input { margin-top: 8px; }
    .lodging-linked-text { color: #2577e3; }
    .preview-panel { padding: 20px; background: #eee; }
    .preview-shell {
      width: 100%; max-width: 900px; min-height: calc(100vh - 152px); margin: auto; padding: 38px 40px;
      background: #fff; border-radius: 12px; box-shadow: var(--shadow);
    }
    .preview-title { margin: 0; text-align: center; font-size: 25px; line-height: 1.35; letter-spacing: -.4px; }
    .preview-kicker {
      width: fit-content; margin: 8px auto 28px; padding: 5px 12px; color: var(--primary);
      background: var(--primary-soft); border-radius: 999px; font-size: 12px; font-weight: 700;
    }
    .preview-highlights {
      margin: -8px 0 28px; padding: 16px 18px; color: var(--body); background: var(--soft);
      border-radius: var(--radius);
    }
    .preview-highlights h3 { margin: 0 0 7px; color: var(--ink); font-size: 15px; }
    .preview-highlights ul { margin: 0; padding-left: 18px; display: grid; gap: 5px; }
    .route-map-editor-preview { padding: 14px; border-top: 1px solid var(--soft-line); background: #fdfdfd; }
    .route-map-empty { padding: 24px 12px; color: var(--muted); background: var(--soft); border-radius: 10px; text-align: center; }
    .preview-route-map {
      margin: -8px 0 28px; padding: 18px; border: 1px solid var(--primary-border); border-radius: var(--radius);
      background: linear-gradient(135deg,var(--primary-soft),#f4f6f8); break-inside: avoid;
    }
    .route-map-head { margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .route-map-head strong { color: var(--ink); font-size: 15px; }
    .route-map-head small { color: var(--primary); font-size: 11px; font-weight: 700; }
    .route-map-surface { overflow: hidden; border: 1px solid #e4e6e8; border-radius: 12px; background: #f7f8f8; }
    .route-map-canvas {
      position: relative; overflow: hidden; aspect-ratio: 920 / 480;
      border: 1px solid #dedede; border-radius: 14px; background: #fff;
    }
    .route-map-layer {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transform-origin: center; pointer-events: none;
    }
    .route-map-base-layer { z-index: 1; }
    .route-map-image-layer { z-index: 2; }
    .route-map-placeholder {
      position: absolute; inset: 0; z-index: 0; display: grid; place-items: center;
      color: var(--muted); background: linear-gradient(135deg,#f8f8f8,#eeeeee); font-size: 13px;
    }
    .route-map-editor-layout { display: grid; gap: 10px; }
    .route-map-editor-canvas {
      position: relative; overflow: hidden; aspect-ratio: 920 / 480;
      border: 1px dashed #d7d9dd; border-radius: 14px; background: #f6f7f8; cursor: grab;
      touch-action: none; user-select: none;
    }
    .route-map-editor-canvas:active { cursor: grabbing; }
    .route-map-editor-canvas.drag-over { border-color: var(--primary); background: var(--primary-soft); }
    .route-map-editor-canvas .route-map-placeholder { z-index: 1; border: 0; pointer-events: none; }
    .route-map-editor-toolbar {
      position: absolute; left: 10px; top: 10px; right: 10px; z-index: 8;
      display: flex; align-items: center; justify-content: space-between; gap: 8px; pointer-events: none;
    }
    .route-map-layer-switch {
      padding: 3px; display: inline-flex; gap: 2px; border: 1px solid rgba(0,0,0,.08);
      border-radius: 999px; background: rgba(255,255,255,.9); box-shadow: 0 6px 18px rgba(0,0,0,.08);
      pointer-events: auto;
    }
    .route-map-layer-switch button {
      min-width: 54px; height: 30px; border: 0; border-radius: 999px; background: transparent;
      color: var(--muted); font-size: 12px; font-weight: 700;
    }
    .route-map-layer-switch button.active { color: #fff; background: var(--primary); }
    .route-map-delete-layer {
      width: 32px; height: 32px; border: 1px solid rgba(0,0,0,.08); border-radius: 50%;
      background: rgba(255,255,255,.92); color: var(--danger); box-shadow: 0 6px 18px rgba(0,0,0,.08);
      font-size: 18px; line-height: 1; pointer-events: auto;
    }
    .route-map-delete-layer:disabled { opacity: .42; color: var(--muted); cursor: not-allowed; }
    .route-map-editor-file { display: none; }
    .route-map-crop-box {
      position: absolute; z-index: 7; border: 1.5px solid rgba(255,255,255,.95);
      box-shadow: 0 0 0 1px var(--primary), 0 8px 22px rgba(0,0,0,.13);
      pointer-events: none;
    }
    .route-map-resize-handle {
      position: absolute; width: 11px; height: 11px; border: 2px solid #fff; border-radius: 2px;
      background: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,.2); pointer-events: auto;
    }
    .route-map-resize-handle[data-map-resize="nw"] { left: -6px; top: -6px; cursor: nwse-resize; }
    .route-map-resize-handle[data-map-resize="ne"] { right: -6px; top: -6px; cursor: nesw-resize; }
    .route-map-resize-handle[data-map-resize="sw"] { left: -6px; bottom: -6px; cursor: nesw-resize; }
    .route-map-resize-handle[data-map-resize="se"] { right: -6px; bottom: -6px; cursor: nwse-resize; }
    .route-map-editor-hint { color: var(--muted); font-size: 12px; text-align: center; }
    .preview-departure-notice {
      margin: -8px 0 28px; padding: 18px; border: 1px solid var(--primary-border); border-radius: var(--radius);
      background: var(--primary-soft); break-inside: avoid;
    }
    .preview-quote-details {
      margin: 30px 0 28px; padding: 18px; border: 1px solid var(--primary-border); border-radius: var(--radius);
      background: var(--primary-soft); break-inside: avoid;
    }
    .preview-quote-details h3 { margin: 0 0 8px; font-size: 15px; }
    .quote-toolbar {
      margin-bottom: 12px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px;
    }
    .quote-toolbar-fixed { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
    .quote-table-wrap { overflow-x: hidden; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
    .quote-table, .preview-quote-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .quote-table { min-width: 0; font-size: 12px; }
    .quote-table th, .quote-table td, .preview-quote-table th, .preview-quote-table td {
      border: 1px solid var(--soft-line); vertical-align: middle; text-align: center;
    }
    .quote-table th { padding: 8px 7px; color: var(--muted); background: var(--soft); font-weight: 700; }
    .quote-table td { padding: 5px; }
    .quote-table th, .quote-table td { overflow-wrap: anywhere; }
    .quote-table input, .quote-table textarea, .quote-note {
      width: 100%; min-height: 34px; padding: 7px 8px; border: 1px solid transparent; border-radius: 7px; background: transparent;
      resize: none; font-size: 12px; text-align: center;
    }
    .quote-table input:focus, .quote-table textarea:focus, .quote-note:focus { border-color: var(--ink); background: #fff; box-shadow: 0 0 0 1px var(--ink); }
    .quote-cell-text { overflow: hidden; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
    .quote-total { font-weight: 700; }
    .quote-project-cell { position: relative; }
    .quote-delete {
      position: absolute; top: 4px; right: 4px; width: 18px; min-height: 18px; padding: 0; border: 0; border-radius: 999px;
      color: var(--muted); background: transparent; font-size: 14px; line-height: 1;
    }
    .quote-delete:hover { color: var(--danger); background: #fff1ee; }
    .quote-fixed-toggle {
      min-height: 28px; padding: 0 9px; display: inline-flex; align-items: center; gap: 5px;
      border: 1px solid var(--line); border-radius: 999px; color: var(--muted); background: #fff; font-size: 12px; font-weight: 650;
    }
    .quote-fixed-toggle input { width: 14px; height: 14px; margin: 0; padding: 0; accent-color: var(--primary); }
    .quote-note-wrap { margin-top: 10px; }
    .quote-note {
      min-height: 76px; padding: 11px 12px; border-color: var(--line); background: #fff;
      resize: vertical; line-height: 1.55; text-align: left;
    }
    .quote-summary-row td { background: var(--primary-soft); font-weight: 700; }
    .quote-summary-row .quote-total { color: var(--primary); }
    .preview-quote-table { font-size: 11px; background: #fff; }
    .preview-quote-table th { padding: 6px 5px; background: var(--primary-border); font-weight: 700; }
    .preview-quote-table td { padding: 6px 5px; color: var(--body); overflow-wrap: anywhere; white-space: pre-wrap; }
    .preview-quote-table tfoot td { color: var(--primary); font-weight: 800; }
    .quote-note-preview {
      margin-top: 12px; padding: 0; list-style: none; color: var(--ink); font-size: 12px; font-weight: 500; text-align: left;
      display: grid; gap: 6px;
    }
    .quote-note-preview li { position: relative; padding-left: 12px; line-height: 1.5; white-space: pre-wrap; }
    .quote-note-preview li::before {
      content: ""; position: absolute; top: .6em; left: 0; width: 4px; height: 4px; border-radius: 50%; background: var(--ink);
    }
    .notice-list { margin: 0; display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 9px 18px; }
    .notice-item { min-width: 0; display: grid; grid-template-columns: 68px 1fr; gap: 7px; }
    .notice-item dt { color: var(--primary); font-weight: 700; }
    .notice-item dd { margin: 0; color: var(--body); white-space: pre-wrap; }
    .notice-item-wide { grid-column: 1 / -1; }
    .itinerary { position: relative; }
    .preview-day {
      position: relative; margin: 0 0 20px; padding: 0 0 20px 50px;
    }
    .preview-day:last-child { margin-bottom: 0; }
    .preview-day::before {
      content: ""; position: absolute; top: 36px; bottom: -21px; left: 17px; width: 1px; background: var(--line);
    }
    .preview-day:last-child::before { display: none; }
    .preview-day-label {
      position: absolute; top: 0; left: 0; width: 35px; height: 35px; display: grid; place-items: center;
      color: white; background: var(--primary); border-radius: 50%; font-size: 11px; font-weight: 700;
    }
    .preview-day-head { min-height: 35px; display: flex; justify-content: space-between; gap: 16px; align-items: start; }
    .preview-route { font-size: 16px; font-weight: 700; }
    .preview-date { flex: none; color: var(--muted); font-size: 12px; }
    .preview-day-card {
      min-height: 170px; padding: 14px 16px; border: 1px solid var(--primary-print-border); border-radius: 14px;
      background: var(--primary-soft); box-shadow: 0 4px 14px rgba(38,42,48,.05);
    }
    .flight { margin-top: 5px; color: var(--muted); font-size: 12px; }
    .schedule { margin: 14px 0; display: grid; gap: 8px; }
    .preview-day-card .schedule { margin: 12px 0; }
    .preview-day-card .schedule::after {
      content: ""; width: calc(100% - 56px); height: 1px; margin: 4px 0 0 56px;
      justify-self: start; background: #dedede;
    }
    .schedule-row { display: grid; grid-template-columns: 48px 1fr; gap: 8px; }
    .schedule-row b { color: var(--primary); font-size: 12px; }
    .schedule-row span { white-space: pre-wrap; }
    .remark-row, .remark-row b { color: #428bff; }
    .meta-grid { display: grid; gap: 7px; }
    .meta { color: var(--body); font-size: 12px; }
    .meta b { color: var(--ink); }
    .meal-row { display: grid; grid-template-columns: 48px repeat(3,minmax(0,1fr)); align-items: start; gap: 8px; }
    .meal-item { min-width: 0; display: grid; grid-template-columns: 18px 1fr; gap: 4px; }
    .meal-item b { font-weight: 600; }
    .lodging-row { display: grid; grid-template-columns: 48px 1fr; gap: 8px; }
    .lodging-row a { color: #2577e3; text-decoration: none; text-underline-offset: 2px; overflow-wrap: anywhere; }
    .lodging-row a:hover { color: #1f63bd; text-decoration: underline; }
    .info-section { margin-top: 30px; padding-top: 22px; }
    .info-section h3 { margin: 0 0 12px; font-size: 17px; }
    .info-list { margin: 0; padding: 0; list-style: none; display: grid; gap: 8px; color: var(--body); }
    .info-list li { position: relative; padding-left: 17px; }
    .info-list li::before { content: ""; position: absolute; left: 0; top: .65em; width: 5px; height: 5px; background: var(--primary); border-radius: 50%; }
    .empty {
      padding: 30px 18px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: var(--radius);
    }
    .mobile-tabs { display: none; }
    .toast {
      position: fixed; left: 50%; bottom: 24px; z-index: 50; transform: translate(-50%, 20px);
      padding: 10px 16px; color: white; background: var(--ink); border-radius: 999px;
      opacity: 0; pointer-events: none; transition: .2s ease; font-size: 13px;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 100; padding: 20px; display: grid; place-items: center;
      background: rgba(0,0,0,.38); backdrop-filter: blur(7px);
    }
    .import-modal {
      width: min(680px,100%); max-height: min(760px,calc(100vh - 40px)); display: flex; flex-direction: column;
      background: #fff; border: 1px solid var(--soft-line); border-radius: 20px; box-shadow: 0 18px 60px rgba(0,0,0,.22); overflow: hidden;
    }
    .confirm-modal { width: min(420px,100%); }
    .confirm-message { margin: 0; color: var(--body); line-height: 1.7; white-space: pre-wrap; }
    .modal-head, .modal-actions { padding: 16px 18px; display: flex; align-items: center; gap: 10px; }
    .modal-head { border-bottom: 1px solid var(--soft-line); }
    .modal-head h2 { margin: 0; font-size: 18px; }
    .modal-close { margin-left: auto; width: 34px; height: 34px; padding: 0; border: 0; border-radius: 9px; background: transparent; font-size: 20px; }
    .modal-close:hover { background: var(--soft); }
    .modal-body { padding: 18px; overflow: auto; }
    .modal-actions { justify-content: flex-end; border-top: 1px solid var(--soft-line); }
    .import-note { margin: 0 0 16px; padding: 11px 12px; color: var(--muted); background: var(--soft); border-radius: 10px; font-size: 12px; }
    .import-note strong { color: var(--ink); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .api-card { display: grid; gap: 12px; }
    .letterhead-modal { width: min(900px,100%); }
    .letterhead-layout { display: grid; grid-template-columns: minmax(260px,.8fr) minmax(300px,1.2fr); gap: 20px; }
    .letterhead-preview-wrap { padding: 14px; display: grid; place-items: center; background: var(--soft); border-radius: 14px; }
    .letterhead-preview {
      position: relative; width: min(100%,330px); aspect-ratio: 210 / 297; overflow: hidden;
      background: #fff center / cover no-repeat; border: 1px solid var(--line); box-shadow: var(--shadow);
    }
    .letterhead-safe-area {
      position: absolute; border: 2px dashed rgba(255,56,92,.82); background: rgba(255,56,92,.05);
      top: var(--lh-top); right: var(--lh-right); bottom: var(--lh-bottom); left: var(--lh-left);
    }
    .letterhead-empty { padding: 28px 16px; text-align: center; color: var(--muted); }
    .letterhead-controls { display: grid; align-content: start; gap: 14px; }
    .letterhead-file-name { color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
    .letterhead-margin-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; }
    .letterhead-margin-grid .field { margin: 0; }
    .letterhead-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .letterhead-status { padding: 11px 12px; color: var(--muted); background: var(--soft); border-radius: 10px; font-size: 12px; white-space: pre-wrap; }
    .letterhead-page-bg { display: none; }
    .api-status {
      padding: 12px; display: grid; gap: 5px; color: var(--muted); background: var(--soft); border-radius: 12px;
    }
    .api-status strong { color: var(--ink); font-size: 15px; }
    .balance-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 8px; }
    .balance-item { padding: 10px; background: #fff; border: 1px solid var(--soft-line); border-radius: 10px; }
    .balance-item span { display: block; color: var(--muted); font-size: 11px; }
    .balance-item strong { display: block; margin-top: 2px; font-size: 14px; }
    @media (max-width: 980px) {
      .topbar { padding: 0 16px; grid-template-columns: auto minmax(150px,220px) auto; }
      .task-switcher { position: relative; left: auto; top: auto; transform: none; width: auto; min-width: 150px; max-width: 220px; }
      .workspace { display: block; padding: 12px; }
      .mobile-tabs {
        display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 12px; padding: 4px;
        position: sticky; top: 80px; z-index: 15; background: #e9e9e9; border-radius: 12px;
      }
      .mobile-tab { min-height: 38px; border: 0; border-radius: 9px; background: transparent; font-weight: 650; }
      .mobile-tab.active { background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.09); }
      .panel { border-radius: 16px; }
      .editor-panel { height: auto; }
      .editor-scroll { overflow: visible; padding: 16px; }
      .preview-panel { display: none; padding: 0; background: transparent; border: 0; box-shadow: none; }
      body.preview-mode .editor-panel { display: none; }
      body.preview-mode .preview-panel { display: block; }
      .preview-shell { min-height: 0; padding: 28px 22px; border-radius: 16px; }
      .letterhead-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 1180px) {
      .quote-table { font-size: 11px; }
      .quote-table th { padding: 7px 4px; }
      .quote-table td { padding: 4px; }
      .quote-table input, .quote-table textarea, .quote-note { padding: 6px 5px; font-size: 11px; }
      .quote-delete { right: 2px; width: 16px; min-height: 16px; font-size: 13px; }
    }
    @media (hover: none) {
      .summary-delete { opacity: 1; visibility: visible; pointer-events: auto; }
    }
    @media (max-width: 620px) {
      .topbar {
        height: auto; min-height: 100px; padding: 8px 12px;
        display: flex; flex-wrap: wrap; align-items: center; justify-content: flex-start; gap: 8px 10px;
      }
      .brand { flex: 0 0 auto; max-width: 118px; }
      .brand-mark { width: 34px; height: 34px; border-radius: 10px; }
      .brand h1 { font-size: 15px; }
      .brand .save-state { display: none; }
      .task-switcher { order: 1; min-width: 150px; max-width: none; flex: 1 1 160px; }
      .task-trigger { min-height: 38px; padding: 0 10px; }
      .top-actions {
        order: 2; flex: 0 0 100%; width: 100%; margin-left: 0;
        display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 8px;
      }
      .top-actions > div { min-width: 0; }
      .top-actions .btn { width: 100%; min-width: 0; min-height: 38px; padding: 0 12px; }
      .mobile-tabs { top: 108px; }
      .demand-inline { grid-template-columns: 1fr; }
      .demand-inline .btn-primary { width: 100%; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .calendar-popover { width: min(310px, calc(100vw - 24px)); }
      .preview-shell { padding: 24px 17px; }
      .preview-route-map { padding: 13px; }
      .preview-title { font-size: 21px; }
      .preview-day { padding-left: 43px; }
      .preview-day-card { min-height: 160px; padding: 12px 13px; }
      .preview-day-head { display: block; }
      .preview-date { margin-top: 2px; }
      .notice-list { grid-template-columns: 1fr; }
      .notice-item-wide { grid-column: auto; }
      .meal-row { grid-template-columns: 48px 1fr; }
      .meal-item { grid-column: 2; }
      .modal-backdrop { padding: 8px; }
      .import-modal { max-height: calc(100vh - 16px); border-radius: 16px; }
    }
    @media print {
      @page { size: A4; margin: 12mm; }
      body { background: #fff; font-size: 10pt; }
      .topbar, .mobile-tabs, .editor-panel, .toast { display: none !important; }
      .workspace { display: block; width: auto; min-height: 0; margin: 0; padding: 0; }
      .preview-panel { display: block !important; padding: 0; border: 0; background: #fff; box-shadow: none; }
      .preview-shell { max-width: none; min-height: 0; margin: 0; padding: 0; border-radius: 0; box-shadow: none; }
      .preview-title { font-size: 20pt; }
      .preview-kicker { margin-bottom: 18px; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .preview-day { break-inside: avoid; margin-bottom: 14px; padding-bottom: 14px; }
      .preview-day-card {
        break-inside: avoid; border-color: transparent; box-shadow: inset 0 0 0 .25mm var(--primary-print-border);
        print-color-adjust: exact; -webkit-print-color-adjust: exact;
      }
      .preview-departure-notice, .preview-route-map, .preview-quote-details {
        border-color: transparent; box-shadow: inset 0 0 0 .25mm var(--primary-border);
        print-color-adjust: exact; -webkit-print-color-adjust: exact;
      }
      .preview-quote-table, .preview-quote-table th, .preview-quote-table td {
        print-color-adjust: exact; -webkit-print-color-adjust: exact;
      }
      .preview-day-label, .info-list li::before { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .preview-route-map, .route-map-surface, .route-map-layer { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .info-section { break-inside: avoid; margin-top: 20px; padding-top: 15px; }
      body.print-with-letterhead .letterhead-page-bg {
        display: block; position: fixed; inset: 0; z-index: -1;
        background: var(--lh-image) center top / 210mm 297mm no-repeat;
        print-color-adjust: exact; -webkit-print-color-adjust: exact;
      }
      body.print-with-letterhead .preview-panel, body.print-with-letterhead .preview-shell { background: transparent; }
      body.print-with-letterhead .preview-shell {
        padding: var(--lh-content-top) var(--lh-content-right) var(--lh-content-bottom) var(--lh-content-left);
        box-decoration-break: clone; -webkit-box-decoration-break: clone;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand-mark" src="avatar.jpg" alt="头像">
      <div>
        <h1>线路定制</h1>
        <div class="save-state" id="saveState">Kevin-SZ</div>
      </div>
    </div>
    <div class="task-switcher">
      <button class="btn task-trigger" id="taskTrigger" type="button"><span id="currentTaskName">当前线路</span><b aria-hidden="true">⌄</b></button>
      <div class="task-menu" id="taskMenu" hidden>
        <div class="task-list" id="taskList"></div>
        <div class="task-theme-picker" id="taskThemePicker">
          <div class="task-theme-picker-label">当前线路色系</div>
          <div class="task-theme-options" id="taskThemeOptions"></div>
        </div>
      </div>
    </div>
    <div class="top-actions">
      <div class="history-switcher">
        <button class="btn" id="undoBtn" type="button">撤销</button>
      </div>
      <div class="import-switcher">
        <button class="btn" id="importTrigger" type="button" aria-expanded="false">线路 <b aria-hidden="true">⌄</b></button>
        <div class="import-menu" id="importMenu" hidden>
          <button class="btn" id="newBlankTaskBtn" type="button">新建线路</button>
          <button class="btn" id="duplicateTaskBtn" type="button">复制线路</button>
          <button class="btn" id="resetBtn" type="button">示例线路</button>
        </div>
      </div>
      <div class="settings-switcher">
        <button class="btn" id="settingsTrigger" type="button" aria-expanded="false">设置 <b aria-hidden="true">⌄</b></button>
        <div class="settings-menu" id="settingsMenu" hidden>
          <button class="btn" id="deepseekSettingsBtn" type="button">API 设置</button>
          <button class="btn" id="letterheadSettingsBtn" type="button">抬头纸设置</button>
          <button class="btn" id="backupTasksBtn" type="button">备份任务库</button>
          <button class="btn" id="restoreTasksBtn" type="button">恢复任务库</button>
        </div>
      </div>
      <div class="export-switcher">
        <button class="btn btn-primary" id="exportTrigger" type="button" aria-expanded="false">导出 <b aria-hidden="true">⌄</b></button>
        <div class="export-menu" id="exportMenu" hidden>
          <button class="btn" id="exportPdfWithBgBtn" type="button">PDF（带抬头纸）</button>
          <button class="btn" id="exportPdfPlainBtn" type="button">PDF（不带抬头纸）</button>
        </div>
      </div>
    </div>
  </header>

  <main class="workspace">
    <nav class="mobile-tabs" aria-label="移动端视图切换">
      <button class="mobile-tab active" type="button" data-mode="edit">编辑线路</button>
      <button class="mobile-tab" type="button" data-mode="preview">客户预览</button>
    </nav>

    <section class="panel editor-panel">
      <div class="editor-scroll">
        <div class="editor-group" data-editor-group="demand">
          <div class="editor-group-head">
            <span class="editor-group-index">01</span>
            <h2 class="editor-group-title">需求信息</h2>
          </div>
          <section class="section demand-section" id="customerDemandSection">
            <label class="field">
              <span>客户需求</span>
              <textarea id="customerDemandInput" rows="5" placeholder="可填写人数、目的地、天数、预算、酒店标准、节奏偏好、必去景点等"></textarea>
            </label>
            <div class="demand-inline">
              <div class="field demand-drop" id="customerReferenceDrop">
                <span>参考行程</span>
                <div class="demand-file-zone">
                  <input id="customerReferenceFileInput" type="file" accept=".pdf,.doc,.docx,.txt,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain" hidden>
                  <button class="btn" id="customerReferenceFileBtn" type="button">选择文件</button>
                  <span class="demand-file-name" id="customerReferenceFileName">未选择任何文件</span>
                </div>
              </div>
              <button class="btn btn-primary" id="recognizeDemandBtn" type="button">识别</button>
            </div>
            <div class="demand-actions">
              <button class="btn" id="retryDemandRecognitionBtn" type="button" hidden>重新识别</button>
              <button class="btn btn-primary" id="applyDemandResultBtn" type="button" hidden>应用到当前线路</button>
            </div>
            <div class="demand-status" id="demandStatus" hidden></div>
            <div class="demand-review" id="demandReview" hidden></div>
          </section>
        </div>

        <div class="editor-group" data-editor-group="base">
          <div class="editor-group-head">
            <span class="editor-group-index">02</span>
            <h2 class="editor-group-title">基础内容</h2>
          </div>

          <section class="section">
            <h3 class="section-title">线路标题</h3>
            <label class="field">
              <input id="titleInput" maxlength="80" placeholder="例如：重庆、成都双飞6日游">
            </label>
          </section>

          <section class="section">
            <h3 class="section-title"><span>每日行程</span><small id="dayCount"></small></h3>
            <div id="daysEditor"></div>
            <button class="btn" id="addDayBottom" type="button" style="width:100%">＋ 新增一天</button>
          </section>

          <section class="section">

        const canvas = e.target.closest("[data-map-dropzone]");

        canvas.classList.remove("drag-over");
      });
      $("#routeMapEditorPreview").addEventListener("drop", e => {
        const canvas = e.target.closest("[data-map-dropzone]");
        if (!canvas) return;
        e.preventDefault();
        canvas.classList.remove("drag-over");
        const file = [...(e.dataTransfer?.files || [])].find(file => file.type.startsWith("image/"));
        if (!file) return toast("请拖入图片文件");
        setRouteMapLayerImage(chooseRouteMapDropLayer(),file);
      });
      $("#routeMapEditorPreview").addEventListener("pointerdown", beginRouteMapPointerEdit);
      $("#departureNoticeVisible").addEventListener("click", e => e.stopPropagation());
      $("#departureNoticeVisible").addEventListener("change", e => {
        const missing = noticeFields.filter(([field]) => requiredNoticeFields.has(field) && !String(data.departureNotice?.[field] || "").trim()).map(([,label]) => label);
        if (e.target.checked && missing.length) {
          e.target.checked = false;
          toast(`请先填写${missing.join("、")}`);
          return;
        }
        remember();
        data.departureNotice ||= {};
        data.departureNotice.visible = e.target.checked;
        $("#departureNoticeSummary").classList.toggle("notice-summary-active",e.target.checked);
        $("#departureNoticeSummary").classList.toggle("notice-summary-muted",!e.target.checked);
        renderPreview(); save();
        toast(e.target.checked ? "出团通知已显示" : "出团通知已隐藏");
      });
      $("#departureNoticeEditor").addEventListener("input", e => {
        const field = e.target.dataset.noticeField;
        if (!field) return;
        rememberEdit(e.target);
        data.departureNotice ||= {};
        data.departureNotice[field] = e.target.value;
        renderPreview(); save();
      });
      $("#quoteDetailsVisible").addEventListener("click", e => e.stopPropagation());
      $("#quoteDetailsVisible").addEventListener("change", e => {
        remember();
        data.quoteDetails = normalizeQuoteDetails(data.quoteDetails);
        data.quoteDetails.visible = e.target.checked;
        $("#quoteDetailsSummary").classList.toggle("notice-summary-active",e.target.checked);
        $("#quoteDetailsSummary").classList.toggle("notice-summary-muted",!e.target.checked);
        renderPreview(); save();
        toast(e.target.checked ? "报价明细已显示" : "报价明细已隐藏");
      });
      $("#quoteDetailsEditor").addEventListener("click", e => {
        const addButton = e.target.closest("#addQuoteRowBtn");
        if (!addButton) return;
        e.preventDefault();
        remember();
        data.quoteDetails = normalizeQuoteDetails(data.quoteDetails);
        data.quoteDetails.rows.push(blankQuoteRow());
        renderAll(); save(); toast("已新增报价项");
      });
      $("#quoteTableEditor").addEventListener("click", e => {
        const button = e.target.closest("[data-delete-quote-row]");
        if (!button) return;
        remember();
        data.quoteDetails = normalizeQuoteDetails(data.quoteDetails);
        data.quoteDetails.rows.splice(Number(button.dataset.deleteQuoteRow),1);
        if (!data.quoteDetails.rows.length) data.quoteDetails.rows.push(blankQuoteRow());
        renderAll(); save(); toast("已删除报价项");
      });
      $("#quoteTableEditor").addEventListener("input", e => {
        data.quoteDetails = normalizeQuoteDetails(data.quoteDetails);
        const rowInput = e.target.closest("[data-quote-field]");
        const fixedInput = e.target.closest("[data-quote-fixed]");
        const noteInput = e.target.closest("[data-quote-note]");
        if (!rowInput && !fixedInput && !noteInput) return;
        rememberEdit(e.target);
        if (rowInput) {
          const index = Number(rowInput.dataset.quoteIndex);
          const field = rowInput.dataset.quoteField;
          if (data.quoteDetails.rows[index]) data.quoteDetails.rows[index][field] = rowInput.value;
        } else if (fixedInput) {
          data.quoteDetails[fixedInput.dataset.quoteFixed].rate = fixedInput.value;
        } else if (noteInput) {
          data.quoteDetails.note = noteInput.value;
        }
        updateQuoteComputed();
        renderPreview(); save();
      });
      $("#quoteTableEditor").addEventListener("change", e => {
        if (e.target.id !== "quoteServiceFeeEnabled" && e.target.id !== "quoteTaxEnabled") return;
        remember();
        data.quoteDetails = normalizeQuoteDetails(data.quoteDetails);
        if (e.target.id === "quoteServiceFeeEnabled") data.quoteDetails.serviceFee.enabled = e.target.checked;
        if (e.target.id === "quoteTaxEnabled") data.quoteDetails.tax.enabled = e.target.checked;
        renderAll(); save();
      });
      $(".editor-panel").addEventListener("input", e => {
        if (e.target.matches("textarea")) minimizeEmptyTextarea(e.target);
      });
      $("#highlightsInput").addEventListener("input", e => { rememberEdit(e.target); data.highlights = e.target.value; renderPreview(); save(); });
      document.querySelectorAll("[data-list-editor]").forEach(editor => {
        const field = editor.dataset.listEditor;
        const syncContinuousEditor = () => {
          const selection = listEditorSelectionOffsets(editor);
          let items = [...editor.querySelectorAll("[data-list-row]")].map(row => row.textContent || "");
          if (!items.length) items = (editor.innerText || "").replace(/\r/g,"").split("\n");
          rememberEdit(editor);
          data[field] = items.map(item => item.trim()).filter(Boolean);
          editor.innerHTML = listEditorRowsHtml(field,items);
          if (selection) setListEditorSelection(editor,selection.start,selection.end);
          renderPreview(); save();
        };
        editor.addEventListener("input", e => {
          if (!e.isComposing) syncContinuousEditor();
        });
        editor.addEventListener("compositionend",syncContinuousEditor);
        editor.addEventListener("keydown", e => {
          if (e.key !== "Enter") return;
          const selection = listEditorSelectionOffsets(editor);
          if (!selection) return;
          e.preventDefault();
          remember();
          const text = listEditorValues(field).join("\n");
          const next = `${text.slice(0,selection.start)}\n${text.slice(selection.end)}`;
          const items = next.split("\n");
          data[field] = items.map(item => item.trim()).filter(Boolean);
          editor.innerHTML = listEditorRowsHtml(field,items);
          setListEditorSelection(editor,selection.start + 1);
          renderPreview(); save();
        });
      });
      $("#daysEditor").addEventListener("input", e => {
        const index = Number(e.target.dataset.index), field = e.target.dataset.field;
        if (!Number.isInteger(index) || !field || !data.days[index]) return;
        rememberEdit(e.target);
        data.days[index][field] = e.target.value;
        if (field === "lodgingUrl") {
          const toggle = e.target.closest(".lodging-field")?.querySelector(".lodging-link-toggle");
          toggle?.classList.toggle("active",Boolean(e.target.value.trim()));
          e.target.closest(".lodging-field")?.querySelector('[data-field="lodging"]')?.classList.toggle("lodging-linked-text",Boolean(e.target.value.trim()));
        }
        if (field === "date") {
          syncDates(index,e.target.value);
          renderAll(index);
          save();
          toast(e.target.value ? "全部日期和星期已自动调整" : "全部日期和星期已清除");
          return;
        }
        const details = e.target.closest("details");
        if (field === "route") {
          details.querySelector("strong").textContent = e.target.value || "未填写路线";
          renderMapEditorPreview();
        }
        renderPreview(); save();
      });
      $("#daysEditor").addEventListener("click", e => {
        if (Date.now() < suppressDragClickUntil) {
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        const summaryDelete = e.target.closest(".summary-delete");
        if (summaryDelete) {
          e.preventDefault();
          e.stopPropagation();
          dayAction("delete",Number(summaryDelete.dataset.index));
          return;
        }
        const calendarTrigger = e.target.closest("[data-calendar-index]");
        if (calendarTrigger) {
          openCalendar(Number(calendarTrigger.dataset.calendarIndex),calendarTrigger);
          return;
        }
        const lodgingLinkToggle = e.target.closest("[data-lodging-link-toggle]");
        if (lodgingLinkToggle) {
          e.preventDefault();
          e.stopPropagation();
          const input = lodgingLinkToggle.closest(".lodging-field")?.querySelector(".lodging-link-input");
          if (!input) return;
          const show = input.hidden;
          input.hidden = !show;
          lodgingLinkToggle.classList.toggle("active",show || Boolean(input.value));
          lodgingLinkToggle.setAttribute("aria-expanded",String(show));
          lodgingLinkToggle.closest(".lodging-field")?.querySelector('[data-field="lodging"]')?.classList.toggle("lodging-linked-text",Boolean(input.value));
          if (show) input.focus();
          return;
        }
        const button = e.target.closest("[data-action]");
        if (button) dayAction(button.dataset.action,Number(button.dataset.index));
      });
      $("#daysEditor").addEventListener("pointerdown", e => {
        const summary = e.target.closest(".day-card summary");
        if (!summary || e.target.closest("button")) return;
        const card = summary.closest(".day-card");
        const cards = [...document.querySelectorAll(".day-card")];
        dragState = { timer:null, active:false, source:cards.indexOf(card), target:cards.indexOf(card), pointerId:e.pointerId };
        dragState.timer = setTimeout(() => {
          dragState.active = true;
          card.classList.add("dragging");
          summary.setPointerCapture?.(e.pointerId);
          toast("拖动到目标位置后松开");
        },450);
      });
      $("#daysEditor").addEventListener("pointermove", e => {
        if (!dragState.active || e.pointerId !== dragState.pointerId) return;
        e.preventDefault();
        const targetCard = document.elementFromPoint(e.clientX,e.clientY)?.closest(".day-card");
        if (!targetCard) return;
        const cards = [...document.querySelectorAll(".day-card")];
        const target = cards.indexOf(targetCard);
        if (target < 0) return;
        dragState.target = target;
        cards.forEach(card => card.classList.toggle("drag-over",card === targetCard && !card.classList.contains("dragging")));
      });
      $("#daysEditor").addEventListener("pointerup", e => {
        if (e.pointerId === dragState.pointerId) endDrag();
      });
      $("#daysEditor").addEventListener("pointercancel", e => {
        if (e.pointerId === dragState.pointerId) endDrag(true);
      });
      $("#calendarPopover").addEventListener("click", e => {
        e.stopPropagation();
        const dayButton = e.target.closest("[data-calendar-day]");
        if (dayButton) {
          calendarState.selected = parseDate(dayButton.dataset.calendarDay);
          calendarState.view = new Date(calendarState.selected.getFullYear(),calendarState.selected.getMonth(),1);
          renderCalendar();
          return;
        }
        const action = e.target.closest("[data-calendar-action]")?.dataset.calendarAction;
        if (!action) return;
        if (action === "prev" || action === "next") {
          calendarState.view.setMonth(calendarState.view.getMonth() + (action === "prev" ? -1 : 1));
          renderCalendar();
        } else if (action === "today") {
          calendarState.selected = new Date();
          calendarState.view = new Date(calendarState.selected.getFullYear(),calendarState.selected.getMonth(),1);
          renderCalendar();
        } else if (action === "clear") commitCalendar("");
        else if (action === "confirm" && calendarState.selected) commitCalendar(toIso(calendarState.selected));
      });
      document.addEventListener("click", e => {
        if (!$("#calendarPopover").hidden && !e.target.closest("#calendarPopover") && !e.target.closest("[data-calendar-index]")) closeCalendar();
        if (!$("#taskMenu").hidden && !e.target.closest(".task-switcher")) closeTaskMenu();
        if (!$("#importMenu").hidden && !e.target.closest(".import-switcher")) closeImportMenu();
        if (!$("#settingsMenu").hidden && !e.target.closest(".settings-switcher")) closeSettingsMenu();
        if (!$("#exportMenu").hidden && !e.target.closest(".export-switcher")) closeExportMenu();
      });
      document.addEventListener("keydown",e => {
        if (e.key === "Escape" && !$("#apiModal").hidden) closeApiModal();
        if (e.key === "Escape" && !$("#letterheadModal").hidden) closeLetterheadModal();
        if (e.key === "Escape" && !$("#confirmModal").hidden) closeConfirmModal(false);
        if (e.key === "Escape") [closeImportMenu,closeSettingsMenu,closeExportMenu].forEach(close => close());
      });
      document.addEventListener("focusout",e => {
        editRememberedTargets.delete(e.target);
      });
      $("#taskTrigger").addEventListener("click",() => {
        $("#taskMenu").hidden = !$("#taskMenu").hidden;
        if (!$("#taskMenu").hidden) renderTaskMenu();
      });
      $("#taskList").addEventListener("click",e => {
        const select = e.target.closest("[data-task-id]");
        if (select) { switchTask(select.dataset.taskId); return; }
        const remove = e.target.closest("[data-delete-task]");
        if (remove) deleteTask(remove.dataset.deleteTask);
      });
      $("#taskThemePicker").addEventListener("click",e => {
        const option = e.target.closest("[data-theme-id]");
        if (option) setCurrentTheme(option.dataset.themeId);
      });
      $("#newBlankTaskBtn").addEventListener("click",() => { closeImportMenu(); createTask("blank"); });
      $("#duplicateTaskBtn").addEventListener("click",() => { closeImportMenu(); createTask("duplicate"); });
      $("#deepseekSettingsBtn").addEventListener("click",() => { closeSettingsMenu(); openApiModal(); });
      $("#letterheadSettingsBtn").addEventListener("click",() => { closeSettingsMenu(); openLetterheadModal(); });
      $("#backupTasksBtn").addEventListener("click",() => { closeSettingsMenu(); backupTasks(); });
      $("#restoreTasksBtn").addEventListener("click",() => { closeSettingsMenu(); $("#restoreTasksInput").click(); });
      $("#restoreTasksInput").addEventListener("change",e => {
        const file = e.target.files?.[0];
        if (file) restoreTasks(file);
        e.target.value = "";
      });
      $("#recognizeDemandBtn").addEventListener("click",startDemandRecognition);
      $("#retryDemandRecognitionBtn").addEventListener("click",startDemandRecognition);
      $("#applyDemandResultBtn").addEventListener("click",applyDemandResult);
      $("#customerDemandInput").addEventListener("input",e => {
        data.customerDemand = e.target.value;
        if (demandState().status !== "idle") resetDemandReview();
        save();
      });
      $("#customerReferenceFileBtn").addEventListener("click",() => $("#customerReferenceFileInput").click());
      $("#customerReferenceFileInput").addEventListener("change",() => {
        updateReferenceFileName();
        if (demandState().status !== "idle") resetDemandReview();
      });
      $("#customerReferenceDrop").addEventListener("dragover",handleDemandDragOver);
      $("#customerReferenceDrop").addEventListener("dragleave",clearDemandDragState);
      $("#customerReferenceDrop").addEventListener("drop",handleDemandFileDrop);
      $("#closeApiBtn").addEventListener("click",closeApiModal);
      $("#closeLetterheadBtn").addEventListener("click",closeLetterheadModal);
      [["apiModal",closeApiModal],["letterheadModal",closeLetterheadModal],["confirmModal",() => closeConfirmModal(false)]].forEach(([id,close]) => {
        $(`#${id}`).addEventListener("click",e => { if (e.target === $(`#${id}`)) close(); });
      });
      $("#letterheadFileInput").addEventListener("change",e => {
        const file = e.target.files?.[0];
        if (file) processLetterheadFile(file);
      });
      document.querySelectorAll("[data-letterhead-margin]").forEach(input => {
        input.addEventListener("input",e => {
          if (e.target.value === "") return;
          const value = Number(e.target.value);
          if (!Number.isFinite(value)) return;
          letterheadDraft.margins[e.target.dataset.letterheadMargin] = value;
          renderLetterheadSafeArea();
        });
        input.addEventListener("blur",e => {
          const side = e.target.dataset.letterheadMargin;
          const value = clampMargin(side,e.target.value);
          letterheadDraft.margins[side] = value;
          e.target.value = value;
          renderLetterheadSafeArea();
        });
      });
      $("#detectLetterheadBtn").addEventListener("click",redetectLetterhead);
      $("#removeLetterheadBtn").addEventListener("click",removeLetterhead);
      $("#saveLetterheadBtn").addEventListener("click",saveLetterheadFromModal);
      ["closeConfirmBtn","cancelConfirmBtn"].forEach(id => $(`#${id}`).addEventListener("click",() => closeConfirmModal(false)));
      $("#acceptConfirmBtn").addEventListener("click",() => closeConfirmModal(true));
      $("#saveDeepseekBtn").addEventListener("click",saveDeepseekFromForm);
      $("#testDeepseekBtn").addEventListener("click",testDeepseekFromForm);
      $("#refreshBalanceBtn").addEventListener("click",refreshBalanceFromForm);
      $("#clearDeepseekBtn").addEventListener("click",clearDeepseekBinding);
      $("#importTrigger").addEventListener("click",() => toggleMenu("importTrigger","importMenu"));
      function closeImportMenu() {
        setMenu("importTrigger","importMenu",false);
      }
      $("#settingsTrigger").addEventListener("click",() => toggleMenu("settingsTrigger","settingsMenu"));
      function closeSettingsMenu() {
        setMenu("settingsTrigger","settingsMenu",false);
      }
      $("#undoBtn").addEventListener("click",undo);
      $("#resetBtn").addEventListener("click",async () => {
        closeImportMenu();
        if (!await askConfirmation("当前线路中的修改将被最新版示例覆盖。","确定恢复最新版示例吗？")) return;
        remember();
        const currentThemeId = data.themeId;
        data = normalizeSavedDates(clone(example));
        data.themeId = currentThemeId;
        clearReferenceFile();
        renderAll(); save(); toast("已恢复最新版示例");
      });
      $("#addDayBottom").addEventListener("click",addDay);
      $("#exportTrigger").addEventListener("click",() => toggleMenu("exportTrigger","exportMenu"));
      function closeExportMenu() {
        setMenu("exportTrigger","exportMenu",false);
      }
      $("#exportPdfWithBgBtn").addEventListener("click",() => { closeExportMenu(); exportPdf(true); });
      $("#exportPdfPlainBtn").addEventListener("click",() => { closeExportMenu(); exportPdf(false); });
      document.querySelectorAll(".mobile-tab").forEach(button => button.addEventListener("click",() => {
        document.body.classList.toggle("preview-mode",button.dataset.mode === "preview");
        document.querySelectorAll(".mobile-tab").forEach(tab => tab.classList.toggle("active",tab === button));
        if (button.dataset.mode === "preview") window.scrollTo({top:0,behavior:"smooth"});
      }));
      document.addEventListener("wheel",routeEditorWheel,{passive:false,capture:true});
      window.addEventListener("resize",() => requestAnimationFrame(syncEditorHeightToPreview),{passive:true});
      await loadLetterheadImage();
      renderAll();
      renderTaskMenu();
      requestAnimationFrame(() => {
        captureCurrentSizes();
        save();
      });
      updateUndoButton();
    })();
  </script>
</body>
</html>
